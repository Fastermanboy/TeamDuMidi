<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>HOLE 'EM ALL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap');
:root{
  --bg:#0a0a1a;--panel:#12122a;--border:#2a2a5a;
  --accent:#ff6b35;--accent2:#ffd166;--text:#e8e8ff;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);}

.screen{display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;min-height:-webkit-fill-available;gap:14px;padding:16px;
  background:radial-gradient(ellipse at 50% 40%,#1a1a40 0%,#0a0a1a 70%);}
.screen.active{display:flex;}

h1.logo{font-family:'Boogaloo',cursive;font-size:clamp(34px,10vw,80px);letter-spacing:3px;
  background:linear-gradient(135deg,#ff6b35,#ffd166,#06d6a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(255,107,53,.55));text-align:center;}
.subtitle{font-size:12px;color:#7777aa;letter-spacing:2px;text-transform:uppercase;text-align:center;}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;
  padding:20px 22px;width:min(420px,100%);display:flex;flex-direction:column;gap:12px;
  box-shadow:0 16px 50px rgba(0,0,0,.5);}
.panel h2{font-family:'Boogaloo',cursive;font-size:22px;color:var(--accent2);text-align:center;}

.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;color:#7777aa;letter-spacing:1px;text-transform:uppercase;}
input[type=text]{background:#0f0f25;border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;color:var(--text);font-family:'Nunito',sans-serif;
  font-size:18px;font-weight:700;outline:none;transition:border-color .2s;width:100%;}
input[type=text]:focus{border-color:var(--accent);}
input[type=range]{accent-color:var(--accent);width:100%;height:28px;}
.slider-row{display:flex;align-items:center;gap:10px;}
.slider-row span{font-weight:900;min-width:44px;color:var(--accent2);
  font-family:'Boogaloo',cursive;font-size:20px;}

.btn{padding:14px 18px;border:none;border-radius:14px;font-family:'Boogaloo',cursive;
  font-size:20px;cursor:pointer;letter-spacing:1px;transition:transform .08s,filter .1s;
  -webkit-user-select:none;user-select:none;}
.btn:active{transform:scale(.95);filter:brightness(.88);}
.btn-primary{background:linear-gradient(135deg,#ff6b35,#e84393);color:#fff;}
.btn-secondary{background:linear-gradient(135deg,#2a2a5a,#3a3a7a);color:var(--text);border:1px solid var(--border);}
.btn-green{background:linear-gradient(135deg,#06d6a0,#0aa070);color:#fff;}
.row-btns{display:flex;gap:10px;}
.row-btns .btn{flex:1;}

.room-code{text-align:center;font-family:'Boogaloo',cursive;font-size:clamp(26px,8vw,40px);
  letter-spacing:8px;color:var(--accent2);text-shadow:0 0 20px rgba(255,209,102,.5);
  background:#0f0f25;border-radius:14px;padding:14px;border:1px solid var(--border);
  cursor:pointer;-webkit-user-select:all;user-select:all;}
.room-label{font-size:11px;color:#5555aa;text-align:center;letter-spacing:2px;}

#lobby-players{display:flex;flex-direction:column;gap:7px;max-height:200px;overflow-y:auto;}
.lp-row{display:flex;align-items:center;gap:10px;background:#1a1a35;border-radius:9px;
  padding:8px 12px;border:1px solid #2a2a4a;font-weight:700;}
.lp-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
.lp-name{flex:1;font-size:14px;}
.lp-you{font-size:11px;color:#5555aa;margin-left:auto;}

.status{font-size:13px;color:#7777aa;text-align:center;min-height:16px;}
.err{color:#ff4466!important;}.ok{color:#06d6a0!important;}

/* ── SPINNER ── */
#connecting-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  backdrop-filter:blur(10px);z-index:500;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;}
#connecting-overlay.show{display:flex;}
.spinner{width:48px;height:48px;border:4px solid #2a2a5a;border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.conn-text{font-family:'Boogaloo',cursive;font-size:22px;color:var(--accent2);}
.conn-sub{font-size:13px;color:#7777aa;text-align:center;max-width:280px;padding:0 16px;}

/* ── GAME ── */
#game-screen{position:fixed;inset:0;display:none;touch-action:none;overflow:hidden;}
#game-canvas{display:block;touch-action:none;}

#hud{position:absolute;top:0;left:0;right:0;pointer-events:none;
  padding:calc(var(--safe-top) + 6px) 10px 6px;
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
  background:linear-gradient(to bottom,rgba(0,0,0,.78) 0%,transparent 100%);}
.hud-card{background:rgba(8,8,20,.85);border:2px solid transparent;border-radius:9px;
  padding:3px 9px;display:flex;align-items:center;gap:5px;backdrop-filter:blur(6px);
  font-size:11px;font-weight:700;}
.hud-dot{width:10px;height:10px;border-radius:50%;}
.hud-name{max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hud-size{color:var(--accent2);font-family:'Boogaloo',cursive;font-size:15px;}

#timer-hud{position:absolute;top:50px;left:50%;transform:translateX(-50%);
  font-family:'Boogaloo',cursive;font-size:34px;color:var(--accent2);
  text-shadow:0 0 14px rgba(255,209,102,.6);pointer-events:none;}

/* ── JOYSTICK VIRTUEL ── */
#joy-base{
  position:absolute;pointer-events:none;display:none;
  width:130px;height:130px;border-radius:50%;
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.18);
  transform:translate(-50%,-50%);
}
#joy-knob{
  position:absolute;pointer-events:none;display:none;
  width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.55),rgba(255,255,255,.1));
  border:2px solid rgba(255,255,255,.4);
  box-shadow:0 0 20px rgba(255,107,53,.55);
  transform:translate(-50%,-50%);
}
#joy-hint{
  position:absolute;bottom:calc(var(--safe-bot)+16px);
  left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,.22);
  pointer-events:none;white-space:nowrap;letter-spacing:1px;
}

/* ── END ── */
#end-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);
  backdrop-filter:blur(14px);z-index:200;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;padding:20px;}
#end-screen h1{font-family:'Boogaloo',cursive;font-size:clamp(30px,7vw,64px);
  background:linear-gradient(135deg,#ffd166,#ff6b35);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#podium{display:flex;align-items:flex-end;gap:10px;justify-content:center;}
.pod-block{display:flex;flex-direction:column;align-items:center;gap:4px;}
.pod-medal{font-family:'Boogaloo',cursive;font-size:20px;}
.pod-name{font-size:12px;font-weight:900;max-width:80px;text-align:center;word-break:break-word;}
.pod-bar{width:68px;border-radius:8px 8px 0 0;display:flex;align-items:center;
  justify-content:center;font-family:'Boogaloo',cursive;font-size:16px;
  color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);}
#scores-list{list-style:none;display:flex;flex-direction:column;gap:5px;
  width:min(300px,100%);max-height:180px;overflow-y:auto;}
#scores-list li{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.06);
  border-radius:8px;padding:6px 10px;}
.s-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.s-stat{margin-left:auto;font-size:11px;color:#6666aa;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#1a1a35;}
::-webkit-scrollbar-thumb{background:#3a3a7a;border-radius:2px;}
</style>
</head>
<body>

<!-- OVERLAY CONNEXION -->
<div id="connecting-overlay">
  <div class="spinner"></div>
  <div class="conn-text" id="conn-text">Connexion…</div>
  <div class="conn-sub" id="conn-sub">Le serveur peut mettre ~30s à démarrer (Render free)</div>
</div>

<!-- ACCUEIL -->
<div id="s-home" class="screen active">
  <h1 class="logo">HOLE 'EM ALL</h1>
  <div class="subtitle">⚫ Multijoueur en ligne</div>
  <div class="panel">
    <h2>🎮 Jouer</h2>
    <div class="field">
      <label>Votre pseudo</label>
      <input type="text" id="inp-name" maxlength="16" placeholder="Ex : DarkHole42"
        autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="row-btns">
      <button class="btn btn-primary" onclick="showCreate()">✦ Créer</button>
      <button class="btn btn-secondary" onclick="showJoin()">🔗 Rejoindre</button>
    </div>
    <div class="status" id="st-home"></div>
  </div>
</div>

<!-- CRÉER -->
<div id="s-create" class="screen">
  <h1 class="logo">HOLE 'EM ALL</h1>
  <div class="panel">
    <h2>✦ Nouvelle partie</h2>
    <div class="field">
      <label>Durée</label>
      <div class="slider-row">
        <input type="range" id="dur-slider" min="60" max="300" step="30" value="120"
          oninput="document.getElementById('dur-label').textContent=fmtTime(+this.value)">
        <span id="dur-label">2:00</span>
      </div>
    </div>
    <div class="row-btns">
      <button class="btn btn-secondary" onclick="showScreen('s-home')">← Retour</button>
      <button class="btn btn-primary" onclick="doCreate()">Créer !</button>
    </div>
    <div class="status" id="st-create"></div>
  </div>
</div>

<!-- REJOINDRE -->
<div id="s-join" class="screen">
  <h1 class="logo">HOLE 'EM ALL</h1>
  <div class="panel">
    <h2>🔗 Rejoindre</h2>
    <div class="field">
      <label>Code de la salle</label>
      <input type="text" id="inp-code" maxlength="6" placeholder="AB12CD"
        autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
        style="text-transform:uppercase;letter-spacing:6px;font-size:26px;text-align:center">
    </div>
    <div class="row-btns">
      <button class="btn btn-secondary" onclick="showScreen('s-home')">← Retour</button>
      <button class="btn btn-primary" onclick="doJoin()">Rejoindre</button>
    </div>
    <div class="status" id="st-join"></div>
  </div>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="screen">
  <h1 class="logo" style="font-size:clamp(24px,7vw,52px)">HOLE 'EM ALL</h1>
  <div class="panel">
    <h2>Salle d'attente</h2>
    <div class="room-label">PARTAGEZ CE CODE</div>
    <div class="room-code" id="room-code-display" onclick="copyCode()">——</div>
    <div id="lobby-players"></div>
    <div class="status" id="lobby-hint">En attente…</div>
    <button class="btn btn-green" id="start-btn" onclick="doStart()" style="display:none">
      ▶ Lancer la partie !
    </button>
    <div class="status" id="st-lobby"></div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen">
  <canvas id="game-canvas"></canvas>
  <div id="hud"></div>
  <div id="timer-hud"></div>
  <div id="joy-base"></div>
  <div id="joy-knob"></div>
  <div id="joy-hint">👆 Posez le doigt n'importe où pour diriger</div>
</div>

<!-- FIN -->
<div id="end-screen">
  <h1>🏆 Résultats</h1>
  <div id="podium"></div>
  <ul id="scores-list"></ul>
  <button class="btn btn-primary" style="width:190px;margin-top:6px" onclick="backHome()">🔁 Rejouer</button>
</div>

<script>
// ════════════════════════════════════════════════
//  ⚠️  CHANGEZ CETTE URL APRÈS DÉPLOIEMENT RENDER
// ════════════════════════════════════════════════
const WS_URL = "wss://teamdumidi.onrender.com";

// ════════════════════════════════════════════════
//  CONSTANTES
// ════════════════════════════════════════════════
const WORLD_W=3200, WORLD_H=2400;
const CAMERA_LERP=0.1;
const JOY_MAX=65;   // rayon max du knob en px écran
const DEAD_ZONE=0.18;

const COLORS=[
  {main:'#ff4d4d',glow:'#ff0000'},{main:'#4d9fff',glow:'#0066ff'},
  {main:'#4dff7a',glow:'#00cc44'},{main:'#ffcc00',glow:'#ff9900'},
  {main:'#cc44ff',glow:'#9900ff'},{main:'#ff8800',glow:'#ff5500'},
  {main:'#00ffee',glow:'#00bbbb'},{main:'#ff66aa',glow:'#ff0066'},
];

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let ws=null, myId=null, myRoomId=null, isHost=false;
let players={}, foods=[], particles=[], timerLeft=0;
let canvas, ctx;
let camX=WORLD_W/2, camY=WORLD_H/2;
let animId=null, loopRunning=false, foodWobble=0;

// Clavier
let keys=new Set(), lastInput={up:false,down:false,left:false,right:false};

// Joystick
let joyActive=false, joyTouchId=null;
let joyOrigin={x:0,y:0}, joyDelta={x:0,y:0};

// ════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id); if(el) el.classList.add('active');
}
function st(id,msg,type=''){
  const el=document.getElementById(id); if(!el) return;
  el.textContent=msg;
  el.className='status'+(type?' '+type:'');
}
function fmtTime(s){return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getName(){
  const n=document.getElementById('inp-name').value.trim();
  if(!n){st('st-home','⚠ Entrez votre pseudo','err');return null;}
  return n;
}
function showCreate(){if(getName()) showScreen('s-create');}
function showJoin(){if(getName()) showScreen('s-join');}
function copyCode(){
  const code=document.getElementById('room-code-display').textContent;
  if(navigator.share){
    navigator.share({title:'HOLE EM ALL',text:`Rejoins ma partie ! Code : ${code}`,url:location.href})
      .catch(()=>{});
  } else {
    navigator.clipboard?.writeText(code).then(()=>st('st-lobby','✓ Code copié !','ok'));
  }
}

// ════════════════════════════════════════════════
//  WEBSOCKET avec retries (cold start Render)
// ════════════════════════════════════════════════
let wsConnecting=false, wsConnectCb=null, wsRetries=0;
function connectWS(cb){
  if(ws&&ws.readyState===1){cb();return;}
  wsConnectCb=cb; wsRetries=0; attemptConnect();
}
function attemptConnect(){
  if(wsConnecting) return;
  wsConnecting=true;
  showOverlay(true,
    wsRetries===0?'Connexion au serveur…':`Tentative ${wsRetries}/6…`,
    'Le serveur peut mettre ~30s à démarrer (Render free)');
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{
    wsConnecting=false; wsRetries=0;
    showOverlay(false);
    if(wsConnectCb){wsConnectCb();wsConnectCb=null;}
  };
  ws.onmessage=e=>{let m;try{m=JSON.parse(e.data);}catch{return;}handleMsg(m);};
  ws.onerror=()=>{};
  ws.onclose=()=>{
    wsConnecting=false;
    if(loopRunning) return;
    if(wsRetries<6){
      wsRetries++;
      const d=wsRetries*4000;
      showOverlay(true,`Serveur en démarrage… (${wsRetries}/6)`,`Réessai dans ${d/1000}s`);
      setTimeout(attemptConnect,d);
    } else {
      showOverlay(false);
      st('st-home','❌ Serveur inaccessible. Vérifiez l\'URL dans index.html','err');
      showScreen('s-home');
    }
  };
}
function showOverlay(show,title='',sub=''){
  const ov=document.getElementById('connecting-overlay');
  ov.classList.toggle('show',show);
  if(title) document.getElementById('conn-text').textContent=title;
  if(sub)   document.getElementById('conn-sub').textContent=sub;
}
function sendWS(obj){if(ws&&ws.readyState===1) ws.send(JSON.stringify(obj));}

// ════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════
function doCreate(){
  const name=getName();if(!name)return;
  const dur=+document.getElementById('dur-slider').value;
  st('st-create','Connexion…');
  connectWS(()=>sendWS({type:'createRoom',name,duration:dur}));
}
function doJoin(){
  const name=getName();if(!name)return;
  const code=document.getElementById('inp-code').value.trim().toUpperCase();
  if(code.length<4){st('st-join','⚠ Code invalide','err');return;}
  st('st-join','Connexion…');
  connectWS(()=>sendWS({type:'joinRoom',name,roomId:code}));
}
function doStart(){sendWS({type:'startGame'});}

// ════════════════════════════════════════════════
//  MESSAGES SERVEUR
// ════════════════════════════════════════════════
function handleMsg(msg){
  switch(msg.type){
    case 'roomCreated': myId=msg.playerId;myRoomId=msg.roomId;isHost=true; enterLobby(msg.roomId);break;
    case 'roomJoined':  myId=msg.playerId;myRoomId=msg.roomId;isHost=false;enterLobby(msg.roomId);break;
    case 'lobbyUpdate': renderLobby(msg.players);break;
    case 'gameStart':   initGame(msg);break;
    case 'state':       applyState(msg);break;
    case 'timer':       timerLeft=msg.t;updateTimerHUD();break;
    case 'gameEnd':     showResults(msg.results);break;
    case 'playerLeft':  if(players[msg.playerId])players[msg.playerId].alive=false;break;
    case 'error':
      ['st-create','st-join','st-lobby'].forEach(id=>st(id,'❌ '+msg.msg,'err'));
      break;
  }
}

// ════════════════════════════════════════════════
//  LOBBY
// ════════════════════════════════════════════════
function enterLobby(roomId){
  document.getElementById('room-code-display').textContent=roomId;
  document.getElementById('start-btn').style.display=isHost?'block':'none';
  st('lobby-hint',isHost
    ? '👑 Host — partagez le code, lancez quand prêt'
    : '⏳ En attente du host…');
  renderLobby([]);
  showScreen('s-lobby');
}
function renderLobby(list){
  const el=document.getElementById('lobby-players');el.innerHTML='';
  list.forEach(p=>{
    const c=COLORS[p.colorIdx]||COLORS[0];
    const d=document.createElement('div');d.className='lp-row';
    d.innerHTML=`<div class="lp-dot" style="background:${c.main};box-shadow:0 0 7px ${c.glow}"></div>
      <span class="lp-name">${esc(p.name)}</span>
      ${p.id===myId?'<span class="lp-you">← Vous</span>':''}`;
    el.appendChild(d);
  });
}

// ════════════════════════════════════════════════
//  INIT JEU
// ════════════════════════════════════════════════
function initGame(msg){
  players={};particles=[];
  msg.players.forEach(p=>{players[p.id]={...p,trail:[],pulseT:0};});
  foods=msg.foods; timerLeft=msg.duration;

  showScreen('__none__');
  document.getElementById('game-screen').style.display='block';

  canvas=document.getElementById('game-canvas');
  ctx=canvas.getContext('2d');
  resizeCvs();
  window.addEventListener('resize',resizeCvs);

  const me=players[myId];
  if(me){camX=me.x;camY=me.y;}

  keys.clear();
  lastInput={up:false,down:false,left:false,right:false};
  window.addEventListener('keydown',onKD);
  window.addEventListener('keyup',onKU);

  // Touch
  joyActive=false; joyTouchId=null; joyDelta={x:0,y:0};
  canvas.addEventListener('touchstart',onTS,{passive:false});
  canvas.addEventListener('touchmove', onTM,{passive:false});
  canvas.addEventListener('touchend',  onTE,{passive:false});
  canvas.addEventListener('touchcancel',onTE,{passive:false});

  buildHUD();updateTimerHUD();

  loopRunning=true;
  loop();
}
function resizeCvs(){
  if(!canvas)return;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}

// ════════════════════════════════════════════════
//  JOYSTICK TACTILE
// ════════════════════════════════════════════════
function onTS(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(joyTouchId===null){
      joyTouchId=t.identifier;
      joyOrigin={x:t.clientX,y:t.clientY};
      joyDelta={x:0,y:0};
      joyActive=true;
      positionJoy(t.clientX,t.clientY,0,0);
      document.getElementById('joy-hint').style.opacity='0';
    }
  }
}
function onTM(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==joyTouchId) continue;
    const dx=t.clientX-joyOrigin.x;
    const dy=t.clientY-joyOrigin.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const clamped=Math.min(dist,JOY_MAX);
    const angle=Math.atan2(dy,dx);
    const kx=Math.cos(angle)*clamped;
    const ky=Math.sin(angle)*clamped;
    joyDelta={x:kx/JOY_MAX, y:ky/JOY_MAX};
    positionJoy(joyOrigin.x,joyOrigin.y,kx,ky);
  }
}
function onTE(e){
  for(const t of e.changedTouches){
    if(t.identifier===joyTouchId){
      joyTouchId=null; joyActive=false; joyDelta={x:0,y:0};
      document.getElementById('joy-base').style.display='none';
      document.getElementById('joy-knob').style.display='none';
    }
  }
}
function positionJoy(bx,by,kx,ky){
  const b=document.getElementById('joy-base');
  const k=document.getElementById('joy-knob');
  b.style.display='block'; b.style.left=bx+'px'; b.style.top=by+'px';
  k.style.display='block'; k.style.left=(bx+kx)+'px'; k.style.top=(by+ky)+'px';
}

// ════════════════════════════════════════════════
//  BOUCLE PRINCIPALE
// ════════════════════════════════════════════════
function loop(){
  if(!loopRunning) return;

  // ── Input ──
  let up,down,left,right;
  if(joyActive){
    up    = joyDelta.y < -DEAD_ZONE;
    down  = joyDelta.y >  DEAD_ZONE;
    left  = joyDelta.x < -DEAD_ZONE;
    right = joyDelta.x >  DEAD_ZONE;
  } else {
    up    = keys.has('z')||keys.has('w')||keys.has('ArrowUp');
    down  = keys.has('s')||keys.has('ArrowDown');
    left  = keys.has('q')||keys.has('a')||keys.has('ArrowLeft');
    right = keys.has('d')||keys.has('ArrowRight');
  }

  const inp={up,down,left,right};
  if(inp.up!==lastInput.up||inp.down!==lastInput.down||
     inp.left!==lastInput.left||inp.right!==lastInput.right){
    sendWS({type:'input',input:inp});
    lastInput={...inp};
  }

  // ── Animations locales ──
  foodWobble+=0.04;
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.life--;return p.life>0;
  });
  Object.values(players).forEach(p=>{
    if(!p.alive)return;
    if(!p.trail)p.trail=[];
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>14)p.trail.shift();
    p.pulseT=(p.pulseT||0)+0.04;
  });

  // ── Caméra ──
  const me=players[myId];
  if(me&&me.alive){camX+=(me.x-camX)*CAMERA_LERP;camY+=(me.y-camY)*CAMERA_LERP;}

  render();
  animId=requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════
//  STATE SERVEUR
// ════════════════════════════════════════════════
function applyState(msg){
  msg.players.forEach(sp=>{
    if(!players[sp.id]){
      players[sp.id]={...sp,trail:[],pulseT:sp.pulseT||0};
    } else {
      const p=players[sp.id];
      p.x+=(sp.x-p.x)*0.4;
      p.y+=(sp.y-p.y)*0.4;
      p.size=sp.size;p.alive=sp.alive;
      p.eaten=sp.eaten;p.eatenPlayers=sp.eatenPlayers;
    }
  });
  if(msg.foodUpdates)msg.foodUpdates.forEach(u=>{foods[u.idx]=u.food;});
  if(msg.kills)msg.kills.forEach(k=>{
    const v=players[k.victim];if(v)burst(v.x,v.y,v.color||'#fff',28);
  });
  updateHUD();
}

// ════════════════════════════════════════════════
//  RENDU
// ════════════════════════════════════════════════
function render(){
  if(!canvas||!ctx)return;
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);

  const me=players[myId];
  const scale=me?Math.min(1.8,Math.max(0.28,600/(me.size*7))):1;
  const tx=W/2-camX*scale, ty=H/2-camY*scale;

  ctx.save();
  ctx.translate(tx,ty);
  ctx.scale(scale,scale);

  drawWorld();
  foods.forEach(f=>{if(f)drawFood(f);});
  Object.values(players).forEach(p=>{if(p.alive)drawTrail(p);});
  Object.values(players).forEach(p=>{if(p.alive)drawHole(p,p.id===myId);});

  particles.forEach(pt=>{
    ctx.globalAlpha=Math.max(0,pt.life/pt.maxLife);
    ctx.fillStyle=pt.color;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  ctx.restore();

  // Overlay mort
  if(me&&!me.alive){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4466';
    ctx.font=`bold ${H*.09}px Boogaloo,cursive`;
    ctx.textAlign='center';
    ctx.fillText('☠ ÉLIMINÉ',W/2,H/2);
    ctx.font=`${H*.035}px Nunito,sans-serif`;
    ctx.fillStyle='#aaaacc';
    ctx.fillText('Attendez la fin de la partie…',W/2,H/2+H*.07);
    ctx.textAlign='left';
  }
}

// ── Monde ──
function drawWorld(){
  const g=ctx.createLinearGradient(0,0,WORLD_W,WORLD_H);
  g.addColorStop(0,'#1a1a35');g.addColorStop(1,'#0f0f22');
  ctx.fillStyle=g;ctx.fillRect(0,0,WORLD_W,WORLD_H);
  ctx.strokeStyle='rgba(255,255,255,0.035)';ctx.lineWidth=1;
  for(let x=0;x<=WORLD_W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,WORLD_H);ctx.stroke();}
  for(let y=0;y<=WORLD_H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WORLD_W,y);ctx.stroke();}
  ctx.strokeStyle='rgba(255,107,53,.5)';ctx.lineWidth=10;
  ctx.strokeRect(4,4,WORLD_W-8,WORLD_H-8);
}

// ── Nourriture ──
function drawFood(f){
  const wb=Math.sin((f.wobble||0)+foodWobble)*1.5;
  ctx.save();ctx.translate(f.x,f.y);ctx.rotate(foodWobble*.3);
  const g=ctx.createRadialGradient(0,0,0,0,0,f.r*2.5);
  g.addColorStop(0,f.color+'88');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,f.r*2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=f.color;ctx.shadowColor=f.color;ctx.shadowBlur=8;
  if(f.type==='circle'){ctx.beginPath();ctx.arc(0,wb*.3,f.r,0,Math.PI*2);ctx.fill();}
  else if(f.type==='star'){drawStar(0,0,5,f.r,f.r*.45);ctx.fill();}
  else{ctx.beginPath();ctx.moveTo(0,-f.r);ctx.lineTo(f.r*.7,0);ctx.lineTo(0,f.r);ctx.lineTo(-f.r*.7,0);ctx.closePath();ctx.fill();}
  ctx.shadowBlur=0;ctx.restore();
}

// ── Trail ──
function drawTrail(p){
  if(!p.trail||p.trail.length<2)return;
  ctx.beginPath();ctx.moveTo(p.trail[0].x,p.trail[0].y);
  for(let i=1;i<p.trail.length;i++)ctx.lineTo(p.trail[i].x,p.trail[i].y);
  ctx.strokeStyle=(p.color||'#fff')+'44';
  ctx.lineWidth=p.size*.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();
}

// ── Trou ──
function drawHole(p,isMe){
  const pulse=1+.04*Math.sin(p.pulseT||0);
  const r=p.size*pulse;
  const c=COLORS[p.colorIdx]||COLORS[0];
  const color=p.color||c.main,glow=p.glow||c.glow;
  ctx.save();ctx.translate(p.x,p.y);
  const og=ctx.createRadialGradient(0,0,r*.4,0,0,r*2);
  og.addColorStop(0,glow+'44');og.addColorStop(1,'transparent');
  ctx.fillStyle=og;ctx.beginPath();ctx.arc(0,0,r*2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=5;ctx.shadowColor=glow;ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
  const ig=ctx.createRadialGradient(0,0,0,0,0,r);
  ig.addColorStop(0,'#000');ig.addColorStop(.65,'#0a0a1e');ig.addColorStop(1,glow+'18');
  ctx.fillStyle=ig;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.rotate((p.pulseT||0)*.4);
  for(let arm=0;arm<3;arm++){
    ctx.save();ctx.rotate((arm/3)*Math.PI*2);ctx.beginPath();
    let first=true;
    for(let t=.05;t<Math.PI*2;t+=.08){
      const sr=(t/(Math.PI*2))*r*.8,sx=Math.cos(t)*sr,sy=Math.sin(t)*sr;
      if(first){ctx.moveTo(sx,sy);first=false;}else ctx.lineTo(sx,sy);
    }
    ctx.strokeStyle=color+'55';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  }
  ctx.restore();
  const fs=Math.max(11,r*.4);
  ctx.font=`bold ${fs}px Nunito,sans-serif`;ctx.textAlign='center';
  ctx.shadowColor=glow;ctx.shadowBlur=10;ctx.fillStyle='#fff';
  ctx.fillText(p.name||'',0,-r-10);ctx.shadowBlur=0;
  if(isMe){
    ctx.strokeStyle='#ffffff55';ctx.lineWidth=2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.arc(0,0,r+10,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.textAlign='left';ctx.restore();
}

// ════════════════════════════════════════════════
//  HUD
// ════════════════════════════════════════════════
function buildHUD(){
  const hud=document.getElementById('hud');hud.innerHTML='';
  Object.values(players).forEach(p=>{
    const c=COLORS[p.colorIdx]||COLORS[0];
    const card=document.createElement('div');card.className='hud-card';card.id=`hc-${p.id}`;
    card.style.borderColor=c.main;card.style.boxShadow=`0 0 7px ${c.glow}55`;
    card.innerHTML=`<div class="hud-dot" style="background:${c.main};box-shadow:0 0 5px ${c.glow}"></div>
      <span class="hud-name">${esc(p.name)}</span>
      <span class="hud-size" id="hs-${p.id}">${Math.round(p.size)}</span>`;
    hud.appendChild(card);
  });
}
function updateHUD(){
  Object.values(players).forEach(p=>{
    const s=document.getElementById(`hs-${p.id}`);if(s)s.textContent=Math.round(p.size);
    const c=document.getElementById(`hc-${p.id}`);if(c)c.style.opacity=p.alive?'1':'0.28';
  });
}
function updateTimerHUD(){
  const el=document.getElementById('timer-hud');if(!el)return;
  el.textContent=`⏱ ${fmtTime(timerLeft)}`;
  el.style.color=timerLeft<=15?'#ff4466':'#ffd166';
}

// ════════════════════════════════════════════════
//  PARTICULES
// ════════════════════════════════════════════════
function burst(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      r:2+Math.random()*4,color,life:40+Math.random()*20,maxLife:60});
  }
}

// ════════════════════════════════════════════════
//  RÉSULTATS
// ════════════════════════════════════════════════
function showResults(results){
  loopRunning=false;cancelAnimationFrame(animId);
  document.getElementById('joy-base').style.display='none';
  document.getElementById('joy-knob').style.display='none';
  document.getElementById('game-screen').style.display='none';
  const pod=document.getElementById('podium'),sl=document.getElementById('scores-list');
  pod.innerHTML='';sl.innerHTML='';
  const medals=['🥈','🥇','🥉'],heights=[90,126,64];
  const po=results.length>=3?[results[1],results[0],results[2]]:
    results.length===2?[null,results[0],results[1]]:[null,results[0],null];
  po.forEach((p,i)=>{
    if(!p)return;
    const c=COLORS[p.colorIdx]||COLORS[0];
    const b=document.createElement('div');b.className='pod-block';
    b.innerHTML=`<div class="pod-medal">${medals[i]}</div>
      <div class="pod-name" style="color:${c.main}">${esc(p.name)}</div>
      <div class="pod-bar" style="height:${heights[i]}px;background:${c.main};box-shadow:0 0 14px ${c.glow}">
        ${Math.round(p.size)}</div>`;
    pod.appendChild(b);
  });
  results.forEach((p,i)=>{
    const c=COLORS[p.colorIdx]||COLORS[0];
    const li=document.createElement('li');
    li.innerHTML=`<div class="s-dot" style="background:${c.main};box-shadow:0 0 5px ${c.glow}"></div>
      <span style="color:${c.main};font-weight:900">#${i+1}</span>
      <span>${esc(p.name)}</span>
      <span class="s-stat">🍽${p.eaten} 💀${p.eatenPlayers}</span>
      <span style="margin-left:auto;font-family:Boogaloo,cursive;color:${c.main}">${Math.round(p.size)}</span>`;
    sl.appendChild(li);
  });
  document.getElementById('end-screen').style.display='flex';
}

function backHome(){
  document.getElementById('end-screen').style.display='none';
  loopRunning=false;cancelAnimationFrame(animId);
  window.removeEventListener('keydown',onKD);
  window.removeEventListener('keyup',onKU);
  window.removeEventListener('resize',resizeCvs);
  if(canvas){
    canvas.removeEventListener('touchstart',onTS);
    canvas.removeEventListener('touchmove',onTM);
    canvas.removeEventListener('touchend',onTE);
    canvas.removeEventListener('touchcancel',onTE);
  }
  players={};foods=[];particles=[];
  if(ws){ws.close();ws=null;}
  showScreen('s-home');
}

// ════════════════════════════════════════════════
//  CLAVIER
// ════════════════════════════════════════════════
function onKD(e){
  keys.add(e.key);
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
}
function onKU(e){keys.delete(e.key);}

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function drawStar(cx,cy,spikes,outerR,innerR){
  let rot=Math.PI/2*3;const step=Math.PI/spikes;
  ctx.beginPath();ctx.moveTo(cx,cy-outerR);
  for(let i=0;i<spikes;i++){
    ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR);rot+=step;
    ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR);rot+=step;
  }
  ctx.lineTo(cx,cy-outerR);ctx.closePath();
}

// Bloque scroll/zoom natif pendant le jeu
document.addEventListener('touchmove',e=>{if(loopRunning)e.preventDefault();},{passive:false});
document.addEventListener('gesturestart',e=>e.preventDefault(),{passive:false});
document.addEventListener('gesturechange',e=>e.preventDefault(),{passive:false});
</script>
